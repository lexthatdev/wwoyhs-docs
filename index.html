<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>wwoyhs</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow: hidden;
}

/* background movement */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;

    background-image: url('background.jpg');
    background-repeat: no-repeat;
    background-size: cover;
}

/* slow drifting motion */
@keyframes moveGrid {
    0% {
        transform: translate(0,0);
    }
    50% {
        transform: translate(-20px, -20px);
    }
    100% {
        transform: translate(0,0);
    }
}

@keyframes drift {
    0% { transform: translate(0,0); }
    50% { transform: translate(-10%, -10%); }
    100% { transform: translate(0,0); }
}

.container {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: rise 1.2s ease forwards;
}

@keyframes rise {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

h1 {
    color: #161616;
    font-family: 'Finger Paint';
    font-weight: 500;
    font-size: 3rem;
    margin: 0;
}

p {
    color: #000;
    opacity: 0.7;
    margin-bottom: 30px;
}

a {
    text-decoration: none;
}

/* links */
.links a {
    color: #000;
    text-decoration: none;
    margin: 0 15px;
    position: relative;
}

.links a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0%;
    height: 1px;
    background: #000;
    transition: width 0.3s;
}

.links a:hover::after {
    width: 100%;
}

.credit {
    margin-top: 10px;
    font-size: 0.9rem;
    opacity: 0.8;
}

.separator {
    width: 20%;
    height: 3px;
    background: linear-gradient(
        to right,
        transparent,
        rgba(0, 0, 0, 1),
        transparent
    );

    margin: 20px 0 30px 0;
    opacity: 0.2;
}

.mention {
    background: rgba(88, 101, 242, 0.2);
    color: #5865f2;
    padding: 2px 6px;
    border-radius: 6px;
    font-weight: 500;
    transition: background 0.2s;
}

.mention:hover {
    background: rgba(88, 101, 242, 0.35);
}
</style>
</head>

<body>
<div class="bg"></div>

<div class="container">
    <h1>wwoyhs</h1>
    <div class="separator"></div>
    <p>
        a private discord bot for creative moderation & tools<br>
        built for a single server environment
    </p>
    <p class="credit">
        compiled and built with &lt;3 by <a href="https://discord.com/users/626451631806087198" class="mention">@lex</a>
    </p>

    <div class="links">
        <a href="tos.html">terms</a>
        <a href="privacy.html">privacy</a>
        <a href="https://discord.gg/DdwyAYSzvU">server</a>
    </div>
</div>
</body>

<script>
document.addEventListener("mousemove", e => {
    document.body.style.background = `radial-gradient(circle at ${e.clientX}px ${e.clientY}px, #111 0%, #000 60%)`;
});
</script>
</html>
